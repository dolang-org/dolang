[package]
name = "dolang"
version = "0.1.1"
description = "Embeddable public API for the Do language."
edition = "2024"
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lib]
test = false

[dependencies]
linkme = "0.3.35"

[dependencies.dolang-compile]
path = "../dolang-compile"
version = "0.1.1"

[dependencies.dolang-runtime]
path = "../dolang-runtime"
version = "0.1.1"

[features]
default = []
debug = ["dolang-runtime/debug", "dolang-compile/debug"]
