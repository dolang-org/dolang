[package]
name = "dolang-shell"
version = "0.1.0"
description = "Stock command-line shell binary for the Do language."
edition = "2024"
license.workspace = true
repository.workspace = true
rust-version.workspace = true
autobins = false

[[bin]]
name = "dolang"
path = "src/main.rs"

[features]
default = ["base64", "digest", "json", "regex", "glob", "http", "zip", "sqlite", "xml", "yaml", "progress", "rand"]
debug = ["dolang-shell-core/debug"]
base64 = ["dep:dolang-ext-base64"]
digest = ["dep:dolang-ext-digest"]
json = ["dep:dolang-ext-json", "dolang-ext-http?/json"]
regex = ["dep:dolang-ext-regex"]
glob = ["dep:dolang-ext-glob"]
url = ["dep:dolang-ext-url"]
http = ["dep:dolang-ext-http", "url"]
zip = ["dep:dolang-ext-zip"]
sqlite = ["dep:dolang-ext-sqlite"]
xml = ["dep:dolang-ext-xml"]
yaml = ["dep:dolang-ext-yaml"]
progress = ["dep:dolang-ext-progress"]
rand = ["dep:dolang-ext-rand"]

[dependencies]
[dependencies.dolang-shell-core]
path = "../dolang-shell-core"
version = "0.1.0"

[dependencies.dolang-shell-modules]
path = "../dolang-shell-modules"
version = "0.1.0"

[dependencies.dolang]
path = "../dolang"
version = "0.1.0"

[dependencies.dolang-ext-digest]
path = "../dolang-ext-digest"
version = "0.1.0"
optional = true

[dependencies.dolang-ext-base64]
path = "../dolang-ext-base64"
version = "0.1.0"
optional = true

[dependencies.dolang-ext-compile]
path = "../dolang-ext-compile"
version = "0.1.0"

[dependencies.dolang-ext-diagnostic]
path = "../dolang-ext-diagnostic"
version = "0.1.0"

[dependencies.dolang-ext-load]
path = "../dolang-ext-load"
version = "0.1.0"

[dependencies.dolang-ext-json]
path = "../dolang-ext-json"
version = "0.1.0"
optional = true

[dependencies.dolang-ext-regex]
path = "../dolang-ext-regex"
version = "0.1.0"
optional = true

[dependencies.dolang-ext-glob]
path = "../dolang-ext-glob"
version = "0.1.0"
optional = true

[dependencies.dolang-ext-http]
path = "../dolang-ext-http"
version = "0.1.0"
optional = true
default-features = false

[dependencies.dolang-ext-url]
path = "../dolang-ext-url"
version = "0.1.0"
optional = true

[dependencies.dolang-ext-zip]
path = "../dolang-ext-zip"
version = "0.1.0"
optional = true

[dependencies.dolang-ext-sqlite]
path = "../dolang-ext-sqlite"
version = "0.1.0"
optional = true

[dependencies.dolang-ext-xml]
path = "../dolang-ext-xml"
version = "0.1.0"
optional = true

[dependencies.dolang-ext-yaml]
path = "../dolang-ext-yaml"
version = "0.1.0"
optional = true

[dependencies.dolang-ext-progress]
path = "../dolang-ext-progress"
version = "0.1.0"
optional = true

[dependencies.dolang-ext-rand]
path = "../dolang-ext-rand"
version = "0.1.0"
optional = true

[build-dependencies]
dolang-private-bundle = { path = "../dolang-private-bundle", version = "0.1.0" }
