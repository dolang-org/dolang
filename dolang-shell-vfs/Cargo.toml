[package]
name = "dolang-shell-vfs"
version = "0.1.1"
description = "Shell VFS daemon for Do language integrations."
edition = "2024"
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lib]
test = true

[[bin]]
name = "dolang-vfs"
path = "src/main.rs"
test = false

[dependencies]
tokio = { version = "1.48.0", features = ["io-std", "io-util", "sync", "rt-multi-thread", "rt", "macros", "fs", "net", "process", "time"] }
wax = { version = "0.7", features = ["walk"] }
serde = { version = "1.0", features = ["derive"] }
which = "8.0"
dolang-rpc = { path = "../dolang-rpc", version = "0.1.1" }
typed-path.workspace = true

[target.'cfg(windows)'.dependencies]
dunce = "1.0"
rand = "0.10"
windows-sys = { version = "0.61", features = ["Wdk_Storage_FileSystem", "Win32_Foundation", "Win32_Security", "Win32_Security_Authorization", "Win32_Storage_FileSystem", "Win32_System_Com", "Win32_System_IO", "Win32_System_Ioctl", "Win32_System_LibraryLoader", "Win32_System_Registry", "Win32_System_SystemServices", "Win32_System_Threading", "Win32_UI_Shell", "Win32_UI_WindowsAndMessaging"] }

[dev-dependencies]
tempfile = "3"
postcard = { version = "1.1.3", features = ["use-std"] }

[target.'cfg(unix)'.dependencies]
tokio = { version = "1.48.0", features = ["process", "time", "signal"] }
libc = "0.2"
nix = { version = "0.31", features = ["dir", "fs", "ioctl", "user", "socket"] }

[target.'cfg(unix)'.dev-dependencies]
futures = "0.3"
