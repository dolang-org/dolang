[package]
name = "dolang-shell-vfs"
version = "0.1.0"
description = "Shell VFS daemon for Do language integrations."
edition = "2024"
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
tokio = { version = "1.48.0", features = ["io-util", "sync", "rt-multi-thread", "rt", "macros", "fs", "net", "process", "time"] }
wax = { version = "0.7", features = ["walk"] }
serde = { version = "1.0", features = ["derive"] }

[target.'cfg(windows)'.dependencies]
dunce = "1.0"

[dev-dependencies]
tempfile = "3"

[target.'cfg(unix)'.dependencies]
tokio-unix-ipc = { package = "dolang-private-ipc", path = "../dolang-private-ipc", version = "0.1.0" }
tokio = { version = "1.48.0", features = ["process", "time", "signal"] }
which = "8.0"
libc = "0.2"
nix = { version = "0.31", features = ["fs", "user", "socket"] }

[target.'cfg(unix)'.dev-dependencies]
futures = "0.3"
