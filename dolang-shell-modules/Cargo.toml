[package]
name = "dolang-shell-modules"
version = "0.1.1"
description = "Stock embedded Do modules for the shell."
edition = "2024"
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lib]
test = false
doctest = false

[build-dependencies]
dolang-private-bundle = { path = "../dolang-private-bundle", version = "0.1.1" }
dolang-ext-shell = { path = "../dolang-ext-shell", version = "0.1.1" }

[features]
debug = ["dolang-private-bundle/debug"]
