name: Test

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_COLOR: 3

permissions:
  contents: read

defaults:
  run:
    shell: >-
      dolang --strict --no-cache
      --import dodo --import fs
      {0}

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v5

      - name: Setup Dolang
        id: dolang
        uses: ./.github/actions/setup-dolang

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Reduce debug info (Windows only)
        if: matrix.os == 'windows-latest'
        run: |
          fs.append $env["GITHUB_ENV"] |
            CARGO_PROFILE_DEV_DEBUG=0
            CARGO_PROFILE_TEST_DEBUG=0

      - name: Install LLVM (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          run brew install llvm
          fs.append $env["GITHUB_ENV"] |
            LIBCLANG_PATH=/opt/homebrew/opt/llvm/lib

      - name: Install Packages (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          import systemd http sudo proc.run:
            - apt

          bind systemd.os_release()
            "UBUNTU_CODENAME": ubuntu_codename = nil
            "VERSION_CODENAME": version_codename
            ...

          sudo.with do
            http.get https://download.docker.com/linux/ubuntu/gpg do |resp|
              fs.write /etc/apt/keyrings/docker.asc $resp.body()
            fs.set_metadata mode: 0o644 /etc/apt/keyrings/docker.asc

            fs.write /etc/apt/sources.list.d/docker.sources |
              Types: deb
              URIs: https://download.docker.com/linux/ubuntu
              Suites: $(ubuntu_codename || version_codename)
              Components: stable
              Signed-By: /etc/apt/keyrings/docker.asc

            apt update
            apt install
              docker-ce docker-ce-cli containerd.io docker-buildx-plugin
              docker-compose-plugin llvm libclang-dev

      - name: Run tests
        run: dodo.run test

  extension:
    name: VS Code Extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Dolang
        id: dolang
        uses: ./.github/actions/setup-dolang

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: dolang-code/package-lock.json

      - name: Install extension dependencies
        working-directory: dolang-code
        run: run npm ci

      - name: Build extension
        working-directory: dolang-code
        run: run npm run compile

      - name: Run extension tests
        working-directory: dolang-code
        run: run xvfb-run -a npm test

      - name: Build preview VSIX
        working-directory: dolang-code
        run: run npm run package:vsix

      - name: Upload preview VSIX
        uses: actions/upload-artifact@v6
        with:
          name: dolang-vsix-preview
          path: dolang-code/*.vsix

  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Dolang
        uses: ./.github/actions/setup-dolang

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: run python -m pip install --requirement docs/requirements.txt

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build docs site
        run: dodo.run mkdocs --target x86_64-linux

      - name: Upload docs artifact
        uses: actions/upload-artifact@v6
        with:
          name: dolang-docs-site
          path: site
