name: Test

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # - os: ubuntu-latest
          #   target: x86_64-unknown-linux-gnu
          # - os: windows-latest
          #   target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Reduce debug info (Windows only)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          echo "CARGO_PROFILE_DEV_DEBUG=0" >> "$GITHUB_ENV"
          echo "CARGO_PROFILE_TEST_DEBUG=0" >> "$GITHUB_ENV"

      - name: Install LLVM (macOS only)
        if: matrix.os == 'macos-latest'
        run: brew install llvm

      - name: Set LIBCLANG_PATH (macOS only)
        if: matrix.os == 'macos-latest'
        run: echo "LIBCLANG_PATH=/opt/homebrew/opt/llvm/lib" >> "$GITHUB_ENV"

      - name: Install Packages (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Add Docker's official GPG key:
          sudo apt update
          sudo apt install ca-certificates curl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc

          # Add the repository to Apt sources:
          sudo tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}")
          Components: stable
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF

          # Install packages
          sudo apt update
          sudo apt install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin llvm libclang-dev

      - name: Run cargo tests
        run: |
          cargo test

      - name: Run integration tests (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cargo build --bin dolang-shell-vfs
          env \
            DOLANG_SHELL_VFS="${{ github.workspace }}/target/debug/dolang-shell-vfs" \
            cargo run --bin dolang -- \
              --module-path "${{ github.workspace }}/testlib" -m test -- test

      - name: Run integration tests (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cargo build --bin dolang-shell-vfs
          $env:DOLANG_SHELL_VFS="${{ github.workspace }}/target/debug/dolang-shell-vfs.exe"
          cargo run --bin dolang -- --module-path "${{ github.workspace }}/testlib" -m test -- test

