name: Docs Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/docs-pages.yml"
      - "docs/**"
      - "lib/**"
      - "mkdocs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build-pages:
    name: Build Pages Site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: python -m pip install --requirement docs/requirements.txt

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build docs site
        run: |
          cargo build --release --bin dolang-highlight --bin dolang-doc
          env \
            DOLANG_HIGHLIGHT=target/release/dolang-highlight \
            DOLANG_DOC=target/release/dolang-doc \
            mkdocs build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-pages:
    name: Deploy Pages
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
