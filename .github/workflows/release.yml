name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: x86_64-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: x86_64-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: aarch64-darwin

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install LLVM (macOS only)
        if: matrix.os == 'macos-latest'
        run: brew install llvm

      - name: Set LIBCLANG_PATH (macOS only)
        if: matrix.os == 'macos-latest'
        run: echo "LIBCLANG_PATH=/opt/homebrew/opt/llvm/lib" >> "$GITHUB_ENV"

      - name: Install musl target (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: rustup target add x86_64-unknown-linux-musl

      - name: Install Packages (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Add Docker's official GPG key:
          sudo apt update
          sudo apt install ca-certificates curl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc

          # Add the repository to Apt sources:
          sudo tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}")
          Components: stable
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF

          # Install packages
          sudo apt update
          sudo apt install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin llvm libclang-dev

      - name: Install LLVM (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y llvm libclang-dev

      - name: Build release binaries (Linux host target)
        if: matrix.os == 'ubuntu-latest'
        run: cargo build --profile dist --target ${{ matrix.target }} --bin dolang --bin dolang-lsp
        env:
          ZSTD_SYS_USE_PKG_CONFIG: "1"

      - name: Build release binaries (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo build --profile dist --target ${{ matrix.target }} --bin dolang --bin dolang-lsp --bin dolang-vfs

      - name: Build release binaries (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo build --profile dist --target ${{ matrix.target }} --bin dolang --bin dolang-lsp --bin dolang-vfs

      - name: Build dolang-vfs (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cargo build --profile dist --target x86_64-unknown-linux-musl -p dolang-shell-vfs

      - name: Stage release layout (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir release
          cp target/${{ matrix.target }}/dist/dolang release/
          cp target/${{ matrix.target }}/dist/dolang-lsp release/
          cp target/x86_64-unknown-linux-musl/dist/dolang-vfs release/

      - name: Stage release layout (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release | Out-Null
          Copy-Item "target/${{ matrix.target }}/dist/dolang.exe" -Destination release/
          Copy-Item "target/${{ matrix.target }}/dist/dolang-lsp.exe" -Destination release/
          Copy-Item "target/${{ matrix.target }}/dist/dolang-vfs.exe" -Destination release/

      - name: Stage release layout (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir release
          cp target/${{ matrix.target }}/dist/dolang release/
          cp target/${{ matrix.target }}/dist/dolang-lsp release/
          cp target/${{ matrix.target }}/dist/dolang-vfs release/

      - name: Run integration tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ./release/dolang --module-path "${{ github.workspace }}/testlib" -m test -- test
        env:
          ZSTD_SYS_USE_PKG_CONFIG: "1"

      - name: Run integration tests (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          ./release/dolang.exe --module-path "${{ github.workspace }}/testlib" -m test -- test

      - name: Run integration tests (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          ./release/dolang --module-path "${{ github.workspace }}/testlib" -m test -- test

      - name: Package release (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          archive="dolang-${{ matrix.artifact_name }}.tar.gz"
          tar -C release -czf "$archive" dolang dolang-lsp dolang-vfs

      - name: Package release (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $archive = "dolang-${{ matrix.artifact_name }}.tar.gz"
          7z a -ttar release.tar ./release/*
          7z a -tgzip $archive release.tar

      - name: Package release (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          archive="dolang-${{ matrix.artifact_name }}.tar.gz"
          tar -C release -czf "$archive" dolang dolang-lsp dolang-vfs

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: dolang-${{ matrix.artifact_name }}
          path: dolang-${{ matrix.artifact_name }}.tar.gz

  build-release-vsix:
    name: Build Release VSIX
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: dolang-code/package-lock.json

      - name: Install extension dependencies
        working-directory: dolang-code
        run: npm ci

      - name: Build extension
        working-directory: dolang-code
        run: npm run compile

      - name: Run extension tests
        working-directory: dolang-code
        run: xvfb-run -a npm test

      - name: Build release VSIX
        working-directory: dolang-code
        run: npm run package:vsix

      - name: Upload release VSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: dolang-vsix
          path: dolang-code/*.vsix

  create-release:
    name: Create Draft Release
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    needs: [build-release, build-release-vsix]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ env.VERSION }}
          draft: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
