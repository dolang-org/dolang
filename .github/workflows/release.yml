name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_COLOR: 3

permissions:
  contents: read

defaults:
  run:
    shell: dolang --strict --no-cache --import dodo --import sys {0}

jobs:
  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: x86_64-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: x86_64-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: aarch64-darwin

    steps:
      - uses: actions/checkout@v5

      - name: Setup Dolang
        id: dolang
        uses: ./.github/actions/setup-dolang

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Prereqs
        run: |
          import systemd http sudo fs
          let os = sys.os_info().os
          if (os == :MACOS:)
            run brew install llvm
            fs.append $env["GITHUB_ENV"] |
              LIBCLANG_PATH=/opt/homebrew/opt/llvm/lib
          else if (os == :LINUX:)
            run rustup target add x86_64-unknown-linux-musl
            bind systemd.os_release()
              "UBUNTU_CODENAME": ubuntu_codename = nil
              "VERSION_CODENAME": version_codename
              ...

            sudo.with do
              http.get https://download.docker.com/linux/ubuntu/gpg do |resp|
                fs.write /etc/apt/keyrings/docker.asc $resp.body()
              fs.set_metadata mode: 0o644 /etc/apt/keyrings/docker.asc

              fs.write /etc/apt/sources.list.d/docker.sources |
                Types: deb
                URIs: https://download.docker.com/linux/ubuntu
                Suites: $(ubuntu_codename || version_codename)
                Components: stable
                Signed-By: /etc/apt/keyrings/docker.asc

              run apt update
              run apt install
                docker-ce docker-ce-cli containerd.io docker-buildx-plugin
                docker-compose-plugin llvm libclang-dev

      - name: Build and install release binaries
        run: |
          dodo.run install --prefix release

      - name: Run integration tests
        run: run release/bin/dolang --module-path testlib -m test -- test

      - name: Package release
        run: |
          import tar fs sys
          let archive = "dolang-${{ matrix.artifact_name }}.tar.gz"
          let suffix = if (sys.os_info().family == :WINDOWS:)
            ".exe"
          else
            ""
          tar.write $archive do |output|
            for name = ["dolang", "dolang-lsp", "dolang-vfs"]
              let filename = "$name$suffix"
              let source = (fs.Path "release/bin"  / filename)
              let metadata = source.metadata()
              output.entry $filename
                size: $metadata.size
                mode: 0o755
                mtime: $metadata.modified
                do |entry|
                  fs.open $source rb do |file|
                    for chunk = file
                      entry.put $chunk

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: dolang-${{ matrix.artifact_name }}
          path: dolang-${{ matrix.artifact_name }}.tar.gz

  build-release-vsix:
    name: Build Release VSIX
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Dolang
        id: dolang
        uses: ./.github/actions/setup-dolang

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: dolang-code/package-lock.json

      - name: Install extension dependencies
        working-directory: dolang-code
        run: run npm ci

      - name: Build extension
        working-directory: dolang-code
        run: run npm run compile

      - name: Run extension tests
        working-directory: dolang-code
        run: run xvfb-run -a npm test

      - name: Build release VSIX
        working-directory: dolang-code
        run: run npm run package:vsix

      - name: Upload release VSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: dolang-vsix
          path: dolang-code/*.vsix

  create-release:
    name: Create Draft Release
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    needs: [build-release, build-release-vsix]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Dolang
        id: dolang
        uses: ./.github/actions/setup-dolang

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract version from tag
        run: |
          import fs
          fs.append $env["GITHUB_ENV"] |
            VERSION=$(env["GITHUB_REF"].without_prefix "refs/tags/")

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ env.VERSION }}
          draft: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
